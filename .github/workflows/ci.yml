name: ci

# Runs the linter and the build on every push to main and every pull request.
# This is the design discipline made mechanical: the schema checks, the sorry-ledger
# consistency, the layer boundaries, and the standalone build all have to pass before
# a change lands. See docs/design-axioms.md (linter rules) for what is enforced.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (if any)
        run: npm ci || npm install || echo "no package manifest yet"

      - name: Lint the graph
        # fields per node kind, atlas_ref and child-id resolution,
        # sorry-marker-to-ledger consistency, no DOM in engine/, acyclic
        # decomposition with primitive leaves, corpus-index completeness
        run: node linter.js

      - name: Check the oracles
        # the gap detector reproduces the sorry ledger; the perturbation overlay
        # is pure and deterministic; the lattice demonstrator reproduces the
        # structural detector and the contamination check bites; the repo map
        # derives the import graph and enforces the trust boundary (one way).
        run: |
          node build/check-gaps.mjs
          node build/check-perturb.mjs
          node build/check-gate.mjs
          node build/check-translate.mjs
          node build/check-migrate.mjs
          node build/check-client.mjs
          node build/check-robustness.mjs
          node build/check-characterized-gaps.mjs
          node build/check-composition.mjs
          node build/check-eggs.mjs
          node build/check-map.mjs

      - name: Verify the vendored browser gate bundle and snapshot are committed and current
        # the compose-gate panel and the propose widget run this bundle over this snapshot; a diff
        # means the kernel or corpus moved but the committed artifacts were not regenerated
        # (build/bundle.js regenerates both too).
        run: |
          node build/vendor-snapshot.mjs
          node build/vendor-gate-browser.mjs
          node build/vendor-eggs.mjs
          git diff --exit-code -- vendor/gate/gate.bundle.js vendor/gate/snapshot.json vendor/eggs/reading.json

      - name: Verify the generated repo map is committed and current
        # check-map rewrites docs/repo-map.{md,generated.json}; a diff here means a
        # source change moved the map but the committed copy was not regenerated.
        run: git diff --exit-code -- docs/repo-map.md docs/repo-map.generated.json

      - name: Build the standalone artifact
        run: node build/bundle.js

      - name: Verify the deliverable is a single self-contained file
        run: test -f submission.html
